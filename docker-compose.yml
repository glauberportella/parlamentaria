services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://parlamentaria:parlamentaria@db:5432/parlamentaria
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./agents:/app/agents
      - ./channels:/app/channels
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: parlamentaria
      POSTGRES_USER: parlamentaria
      POSTGRES_PASSWORD: parlamentaria
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parlamentaria"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: [redisdata:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  celery-worker:
    build: ./backend
    command: celery -A app.tasks worker -l info --concurrency=2
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://parlamentaria:parlamentaria@db:5432/parlamentaria
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./agents:/app/agents
      - ./channels:/app/channels
      - ./backend/app:/app/app
    restart: unless-stopped

  celery-beat:
    build: ./backend
    command: celery -A app.tasks beat -l info --schedule=/tmp/celerybeat-schedule
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./agents:/app/agents
      - ./channels:/app/channels
      - ./backend/app:/app/app
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
