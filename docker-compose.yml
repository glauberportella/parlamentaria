services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-parlamentaria}:${POSTGRES_PASSWORD:-parlamentaria}@db:5432/${POSTGRES_DB:-parlamentaria}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-parlamentaria}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./agents:/app/agents
      - ./channels:/app/channels
      - ./backend/app:/app/app
      - ./backend/scripts:/app/scripts
      - ${PREMIUM_PATH:-./premium}:/app/premium
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-parlamentaria}
      POSTGRES_USER: ${POSTGRES_USER:-parlamentaria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-parlamentaria}
    # Porta NÃO exposta por padrão (segurança). Usar override local para debug.
    # ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parlamentaria"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # Porta NÃO exposta por padrão (segurança). Usar override local para debug.
    # ports: ["6379:6379"]
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD:-parlamentaria}
    volumes:
      - redisdata:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-parlamentaria}", "--no-auth-warning", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    depends_on:
      redis-sysctl:
        condition: service_completed_successfully

  redis-sysctl:
    image: busybox
    privileged: true
    command: ["sh", "-c", "sysctl -w vm.overcommit_memory=1 || true"]
    restart: "no"

  celery-worker:
    build: ./backend
    command: celery -A app.tasks worker -l info --concurrency=2
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-parlamentaria}:${POSTGRES_PASSWORD:-parlamentaria}@db:5432/${POSTGRES_DB:-parlamentaria}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-parlamentaria}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./agents:/app/agents
      - ./channels:/app/channels
      - ./backend/app:/app/app
      - ${PREMIUM_PATH:-./premium}:/app/premium
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks inspect ping --timeout 10 2>/dev/null | grep -q OK || exit 1"]
      interval: 30s
      timeout: 15s
      start_period: 120s
      retries: 5
    restart: unless-stopped

  celery-beat:
    build: ./backend
    command: celery -A app.tasks beat -l info --schedule=/tmp/celerybeat-schedule
    env_file: .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-parlamentaria}@redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./agents:/app/agents
      - ./channels:/app/channels
      - ./backend/app:/app/app
      - ${PREMIUM_PATH:-./premium}:/app/premium
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks inspect ping --timeout 10 2>/dev/null | grep -q OK || exit 1"]
      interval: 30s
      timeout: 15s
      start_period: 120s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
