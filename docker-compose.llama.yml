# docker-compose.llama.yml
# Override para rodar Parlamentaria com Llama 3.1 8B Instruct via Ollama.
#
# Uso:
#   docker compose -f docker-compose.yml -f docker-compose.llama.yml up --build
#
# Primeira execução: aguarde o download do modelo (~8.5 GB).
#   docker compose -f docker-compose.yml -f docker-compose.llama.yml logs -f ollama-pull

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_NUM_PARALLEL=4
    # GPU NVIDIA — descomente se disponível:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "ollama pull llama3.1:8b-instruct-q8_0 && echo 'Model ready!'"
    restart: "no"

  backend:
    environment:
      - AGENT_MODEL=litellm/ollama_chat/llama3.1:8b-instruct-q8_0
      - OLLAMA_API_BASE=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy

  celery-worker:
    environment:
      - AGENT_MODEL=litellm/ollama_chat/llama3.1:8b-instruct-q8_0
      - OLLAMA_API_BASE=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  ollama_data:
