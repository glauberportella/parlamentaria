# docker-compose.premium.yml
# Override para habilitar o plugin premium (parlamentaria-premium).
#
# Uso:
#   docker compose -f docker-compose.yml -f docker-compose.premium.yml up -d --build
#
# Ou com local override (dev):
#   docker compose -f docker-compose.yml -f docker-compose.local.yml -f docker-compose.premium.yml up -d --build
#
# Pré-requisitos:
#   - Repositório parlamentaria-premium clonado em ../parlamentaria-premium
#   - .env com STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, RESEND_API_KEY
#
# O plugin é montado como volume em /app/premium e importado automaticamente
# pelo backend via ImportError-safe loading em app/main.py.

services:
  backend:
    volumes:
      - ../parlamentaria-premium/premium:/app/premium
    environment:
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-noreply@parlamentaria.app}

  celery-worker:
    volumes:
      - ../parlamentaria-premium/premium:/app/premium
    environment:
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-noreply@parlamentaria.app}

  celery-beat:
    volumes:
      - ../parlamentaria-premium/premium:/app/premium
    environment:
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
