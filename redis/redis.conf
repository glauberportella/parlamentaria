# Parlamentaria — Redis Production Configuration
# ================================================
# Para uso em produção / homelab com exposição pública.
# Referência: https://redis.io/docs/management/config/
#
# A senha é injetada via docker-compose (--requirepass).
# NÃO definir requirepass aqui para evitar hardcoding.

# --- Rede ---
# Aceitar conexões apenas na interface do container (Docker internal)
bind 0.0.0.0
protected-mode yes

# Porta padrão (não expor no host em produção)
port 6379

# Timeout de conexões idle (300s = 5min)
timeout 300

# TCP keepalive (detecção de conexões mortas)
tcp-keepalive 60

# --- Memória ---
# Limite de memória (ajustar conforme servidor; 256MB é seguro para o projeto)
maxmemory 256mb

# Política de evição: remove chaves menos usadas quando atingir o limite
# allkeys-lru é ideal para cache (Celery broker + cache de API)
maxmemory-policy allkeys-lru

# --- Persistência RDB (snapshots) ---
# Salva snapshot se N chaves mudaram em M segundos
# Balanceia durabilidade com performance
save 900 1
save 300 10
save 60 10000

# Compressão de dumps RDB
rdbcompression yes
rdbchecksum yes

# Nome e diretório do dump
dbfilename dump.rdb
dir /data

# Não falhar em erro de BGSAVE (permite Redis continuar operando)
stop-writes-on-bgsave-error no

# --- Persistência AOF (append-only file) ---
# AOF oferece durabilidade superior ao RDB para dados de sessão/filas
appendonly yes
appendfilename "appendonly.aof"

# Sync a cada segundo (bom balanço entre performance e durabilidade)
appendfsync everysec

# Não reescrever AOF durante BGSAVE (evita pico de I/O)
no-appendfsync-on-rewrite yes

# Auto-rewrite do AOF quando cresce 100% do tamanho original
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# --- Logging ---
loglevel notice
logfile ""

# --- Performance ---
# Lazy free: libera memória em background (menos latência)
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# Número de databases (default 16, usamos 0 para app)
databases 4

# --- Segurança ---
# Desabilitar comandos perigosos em produção
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""

# KEYS é lento em produção (bloqueia), desabilitar
rename-command KEYS ""
